# ==========================================
# 0. SHELL
# ==========================================
set -g default-shell /opt/homebrew/bin/zsh

# ==========================================
# 1. PLUGINS & THEME
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

### PLUGINS ###
set -g @plugin 'o0th/tmux-nova'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

### THEME & WIDTH FIXES ###
set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left 
set -g @nova-nerdfonts-right 

#set -g @nova-pane "#I #W"
set -g @nova-pane "#I #W#{?window_zoomed_flag, (Z),}"

set -g @nova-rows 0


### COLORS ###
b_bg="#504945"
seg_a="#a89984 #282828"
seg_b="$b_bg #ddc7a1"

inactive_bg="#32302f"
inactive_fg="#ddc7a1"
active_bg=$b_bg
active_fg="#ddc7a1"

set -gw window-status-current-style bold
set -g "@nova-status-style-bg" "$inactive_bg"
set -g "@nova-status-style-fg" "$inactive_fg"
set -g "@nova-status-style-active-bg" "$active_bg"
set -g "@nova-status-style-active-fg" "$active_fg"

set -g "@nova-pane-active-border-style" "#44475a"
set -g "@nova-pane-border-style" "#827d51"

### STATUS BAR SEGMENTS ###
# set -g @nova-segment-prefix "#{?client_prefix,PREFIX,}"
# set -g @nova-segment-prefix-colors "$seg_b"

# Shows a bold icon and text only when Prefix is active
set -g @nova-segment-prefix "#{?client_prefix,#[fg=#282828]#[bg=#fe8019] ⌨  PREFIX ,}"
set -g @nova-segment-prefix-colors "$seg_b"

# Keep long session names from crowding the status bar
set -g @nova-segment-session "#{=/8/…:session_name}"
set -g @nova-segment-session-colors "$seg_a"

# Shows a magnifying glass icon only when a window is zoomed
set -g @nova-segment-zoom "#{?window_zoomed_flag, 🔍 ZOOM ,}"
set -g @nova-segment-zoom-colors "#fe8019 #282828"

# CPU & RAM
set -g @nova-segment-cpu " #(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) #(~/.tmux/plugins/tmux-cpu/scripts/ram_percentage.sh) "
set -g @nova-segment-cpu-colors "$seg_b"

# Battery
set -g @batt_icon_status_charging '↑'
set -g @batt_icon_status_discharging '↓'
set -g @nova-segment-battery "#{battery_icon_status} #{battery_percentage} "
set -g @nova-segment-battery-colors "$seg_b"

# Removed 'whoami' to save space
set -g @nova-segments-0-left "session"
set -g @nova-segments-0-right "prefix zoom cpu "

# ==========================================
# 2. KEYBINDINGS
# ==========================================
# Prefix remapped to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# when closing last window of a session, go to another non-attached session
set-option -g detach-on-destroy no-detached

# Clear screen and scrollback
bind C send-keys C-l \; clear-history
bind-key -n C-k send-keys C-l \; run-shell "sleep .3s" \; clear-history

# Pass Shift+Enter through to applications (e.g. pi coding agent newline)
bind -n S-Enter send-keys Escape "[13;2u"

# Vi-style keys in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel


# Vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Prompt for a name when creating a new session
bind S command-prompt -p "New session name:" "new-session -s '%%' -c '#{pane_current_path}'"

# Set a manual window title and keep plugins/apps from changing it
bind T command-prompt -p "Window title:" "rename-window '%%' \; set-window-option @pi-title-locked on \; set-window-option allow-rename off \; display-message 'Window title locked'"

# Re-enable automatic window title updates from the plugin/apps
bind u set-window-option -u @pi-title-locked \; set-window-option -u allow-rename \; display-message "Window title unlocked"

# New windows/panes keep current directory
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ==========================================
# 3. QUALITY-OF-LIFE DEFAULTS
# ==========================================
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 0
set -g focus-events on
set -g mouse on
set -g set-clipboard on
set -g allow-passthrough on
set -g allow-rename on
setw -g automatic-rename off
set -g bell-action none
set -g visual-activity on

# Truecolor support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

set -s extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'



# ==========================================
# 4. Disable/enable keybindings in tmus
# ==========================================
bind -T root F12 \
 set prefix None \; \
 set key-table off \; \
 set status-style "bg=#444444" \; \
 refresh-client -S

bind -T off F12 \
 set -u prefix \; \
 set -u key-table \; \
 set -u status-style \; \
 refresh-client -S

# ==========================================
# 5. INITIALIZE TPM
# ==========================================
run '~/.tmux/plugins/tpm/tpm'
run-shell ~/.tmux/plugins/tmux-nova/nova.tmux
